<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechSolutions — {% block titulo %}Sistema{% endblock %}</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; color:#333; }

        nav {
            background: linear-gradient(135deg,#1a237e,#283593);
            padding: 0 30px;
            display: flex; align-items: center; gap: 20px;
            height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        nav .logo { color:white; font-size:1.3rem; font-weight:bold; margin-right:auto; }
        nav a { color:#b3c5ff; text-decoration:none; padding:8px 16px;
                border-radius:6px; transition:background .2s; font-size:.9rem; }
        nav a:hover { background:rgba(255,255,255,.15); color:white; }

        .container { max-width:1100px; margin:30px auto; padding:0 20px; }

        .alerta { padding:12px 20px; border-radius:8px; margin-bottom:20px; font-weight:500; }
        .alerta.sucesso { background:#e8f5e9; color:#2e7d32; border-left:4px solid #4caf50; }
        .alerta.erro    { background:#ffebee; color:#c62828; border-left:4px solid #f44336; }
        .alerta.info    { background:#e3f2fd; color:#1565c0; border-left:4px solid #2196f3; }

        .card { background:white; border-radius:12px; padding:25px;
                box-shadow:0 2px 12px rgba(0,0,0,.08); margin-bottom:20px; }
        .card h2 { color:#1a237e; margin-bottom:20px; font-size:1.3rem; }

        table { width:100%; border-collapse:collapse; }
        th { background:#1a237e; color:white; padding:12px 15px; text-align:left; }
        td { padding:11px 15px; border-bottom:1px solid #eceff1; }
        tr:hover td { background:#f5f7fa; }

        .btn { display:inline-block; padding:10px 22px; border-radius:8px; border:none;
               cursor:pointer; font-size:.9rem; font-weight:600; text-decoration:none;
               transition:all .2s; }
        .btn-primary { background:#1a237e; color:white; }
        .btn-primary:hover { background:#283593; transform:translateY(-1px); }
        .btn-danger  { background:#f44336; color:white; font-size:.8rem; padding:6px 12px; }

        .form-group { margin-bottom:18px; }
        label { display:block; margin-bottom:6px; font-weight:600; color:#444; }
        input, select { width:100%; padding:10px 14px; border:1.5px solid #ddd;
                        border-radius:8px; font-size:.95rem; }
        input:focus, select:focus { outline:none; border-color:#1a237e; }

        .badge { padding:4px 10px; border-radius:20px; font-size:.8rem; font-weight:bold; }
        .badge-pendente { background:#fff3e0; color:#e65100; }
        .badge-enviado  { background:#e8f5e9; color:#2e7d32; }
        .badge-falhou   { background:#ffebee; color:#c62828; }
    </style>
</head>
<body>
<nav>
    <span class="logo">🏢 TechSolutions</span>
    <a href="/">🏠 Dashboard</a>
    <a href="/clientes">👥 Clientes</a>
    <a href="/clientes/novo">➕ Novo Cliente</a>
    <a href="/faturas">📄 Faturas</a>
    <a href="/faturas/nova">➕ Nova Fatura</a>
</nav>
<div class="container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
            <div class="alerta {{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}
    {% block conteudo %}{% endblock %}
</div>
</body>
</html>
