{% extends "base.html" %}
{% block titulo %}Novo Cliente{% endblock %}

{% block conteudo %}
<div class="max-w-2xl mx-auto mt-4">
  <div class="mb-6 flex items-center gap-3">
    <a href="/clientes" class="w-10 h-10 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-colors shadow-sm">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Cadastrar Novo Cliente</h1>
  </div>

  <div class="bg-white rounded-xl card-shadow border border-slate-100 p-8">
    <form method="POST" action="/clientes/novo" class="space-y-6">
      
      <div>
        <label for="nome" class="block text-sm font-medium text-slate-700 mb-2">Nome Completo <span class="text-red-500">*</span></label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-regular fa-user text-slate-400"></i>
          </div>
          <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow sm:text-sm">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-2">E-mail <span class="text-red-500">*</span></label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-regular fa-envelope text-slate-400"></i>
            </div>
            <input type="email" id="email" name="email" placeholder="joao@email.com" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow sm:text-sm">
          </div>
        </div>

        <div>
          <label for="telefone" class="block text-sm font-medium text-slate-700 mb-2">WhatsApp <span class="text-red-500">*</span></label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-brands fa-whatsapp text-slate-400"></i>
            </div>
            <input type="text" id="telefone" name="telefone" placeholder="5548999999999" required class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow sm:text-sm">
          </div>
          <p class="mt-1 text-xs text-slate-500">Formato: DDI + DDD + Número</p>
        </div>
      </div>

      <div>
        <label for="endereco" class="block text-sm font-medium text-slate-700 mb-2">Endereço (Opcional)</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-map-pin text-slate-400"></i>
          </div>
          <input type="text" id="endereco" name="endereco" placeholder="Rua, número, cidade" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow sm:text-sm">
        </div>
      </div>

      <div class="pt-4 mt-6 border-t border-slate-100 flex justify-end gap-3">
        <a href="/clientes" class="px-5 py-2.5 border border-slate-300 rounded-lg font-medium text-slate-700 text-sm hover:bg-slate-50 transition-colors">Cancelar</a>
        <button type="submit" class="bg-brand-dark hover:bg-slate-800 text-white px-6 py-2.5 rounded-lg font-medium text-sm transition-colors shadow-sm flex items-center gap-2">
          <i class="fa-solid fa-check"></i> Salvar Cliente
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
